appId: sh.clawnify.ateam
productName: Ateam
directories:
  output: release
  buildResources: build
# electron-vite bundles main/preload/renderer into out/; @grove/* workspace
# packages are inlined there. Only native deps load from node_modules at runtime.
files:
  - out/**/*
  - package.json
asarUnpack:
  - "**/*.node"
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/node-pty/**"
# Native modules are prebuilt for Electron arm64 via `bun run rebuild`; don't let
# electron-builder rebuild them under the x64 toolchain.
npmRebuild: false
mac:
  target:
    - target: dmg
      arch:
        - arm64
  icon: build/icon.icns
  category: public.app-category.developer-tools
  # Unsigned for the first release (no Developer ID cert). Users right-click → Open.
  identity: null
dmg:
  title: ${productName}
  # Default contents = the app + an Applications alias → the standard
  # "drag to Applications" install window.
  artifactName: ${productName}-${version}-arm64.${ext}
