appId: sh.clawnify.ateam
productName: Ateam
directories:
  output: release
  buildResources: build
# electron-vite bundles main/preload/renderer into out/; @ateam/* workspace
# packages are inlined there. Only native deps load from node_modules at runtime.
files:
  - out/**/*
  - package.json
asarUnpack:
  - "**/*.node"
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/node-pty/**"
# Native modules are prebuilt for Electron arm64 via `bun run rebuild`; don't let
# electron-builder rebuild them under the x64 toolchain.
npmRebuild: false
# Auto-update feed: electron-updater reads latest-mac.yml + the zip from the
# newest GitHub release (public repo — no token needed at runtime).
publish:
  provider: github
  owner: clawnify
  repo: ateam
mac:
  target:
    - target: dmg
      arch:
        - arm64
    # zip target is required for macOS auto-updates (Squirrel.Mac)
    - target: zip
      arch:
        - arm64
  icon: build/icon.icns
  category: public.app-category.developer-tools
  # Signed with the Developer ID Application cert from the keychain (auto-
  # discovered). To build unsigned: CSC_IDENTITY_AUTO_DISCOVERY=false bun run dist
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Friendly TCC (Files & Folders) prompt text — macOS asks automatically the
  # first time a project in one of these folders is opened.
  extendInfo:
    NSDesktopFolderUsageDescription: Ateam opens project repositories and git worktrees you select on your Desktop.
    NSDocumentsFolderUsageDescription: Ateam opens project repositories and git worktrees you select in Documents.
    NSDownloadsFolderUsageDescription: Ateam opens project repositories and git worktrees you select in Downloads.
# Notarize + staple after signing (uses keychain profile "ateam-notary";
# skips gracefully if the profile doesn't exist yet).
afterSign: scripts/notarize.cjs
dmg:
  title: ${productName}
  # Default contents = the app + an Applications alias → the standard
  # "drag to Applications" install window.
  # Stable (unversioned) name so the README's
  # releases/latest/download/Ateam-macos.dmg link always works; the release
  # tag carries the version.
  artifactName: ${productName}-macos.${ext}
